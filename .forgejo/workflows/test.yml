name: PR Test

on:
  pull_request:

jobs:
  go-test:
    name: Go test
    runs-on: codeberg-tiny
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Check for Go/frontend changes
        id: changes
        run: |
          FILES=$(git diff --name-only origin/${{ forgejo.base_ref }}...HEAD -- '*.go' 'go.mod' 'go.sum' 'webui/**' 'package.json' 'package-lock.json')
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$FORGEJO_OUTPUT"
          else
            echo "skip=false" >> "$FORGEJO_OUTPUT"
          fi

      - name: Set up Go
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 'stable'

      - name: Set up Node
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: latest

      - name: Build SPA
        if: steps.changes.outputs.skip != 'true'
        run: npm ci && sh webui/build.sh

      - name: Run Go tests
        if: steps.changes.outputs.skip != 'true'
        run: go test -race -cover ./...
